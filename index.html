// 날짜 범위의 일수
function rangeDays() {
  var f = new Date(document.getElementById('dateFrom').value);
  var t = new Date(document.getElementById('dateTo').value);
  return Math.max(1, Math.round((t - f) / 86400000) + 1);
}
// 해당 월의 총 일수
function monthDays(dateStr) {
  var d = new Date(dateStr);
  return new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
}
function getYearMonth(dateStr) {
  return dateStr ? dateStr.slice(0, 7) : '';
}

// CSV 한 줄 파싱
function splitCSVLine(line) {
  var cols = [], cur = '', inQuote = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line[i];
    if (ch === '"') { inQuote = !inQuote; }
    else if (ch === ',' && !inQuote) { cols.push(cur.trim()); cur = ''; }
    else { cur += ch; }
  }
  cols.push(cur.trim());
  return cols;
}

function parseBudgetNum(str) {
  var clean = (str || '').replace(/₩/g,'').replace(/\s/g,'').replace(/,/g,'').replace(/[^0-9.]/g,'');
  return Number(clean) || 0;
}

// 새 시트 파싱: 헤더에서 월 컬럼 인덱스 찾아서 { storageKey: 월예산 } 반환
function parseBudgetSheet(text, targetMonth) {
  // targetMonth: '03' 형태
  var cleaned = '';
  var inQ = false;
  for (var ci = 0; ci < text.length; ci++) {
    var c = text[ci];
    if (c === '"') { inQ = !inQ; cleaned += c; }
    else if ((c === '\n' || c === '\r') && inQ) { cleaned += ' '; }
    else { cleaned += c; }
  }

  var lines = cleaned.trim().split('\n');
  if (lines.length < 2) return {};

  var headers = splitCSVLine(lines[0]);
  // 헤더: 브랜드,세부,매체,연간,12월,1월,2월,...
  // 월 컬럼 찾기: "1월"~"12월"
  var monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  var targetLabel = monthNames[parseInt(targetMonth,10)-1];

  // 헤더에 같은 월 이름이 여러 번 나올 수 있으므로 마지막 인덱스 사용 (현재 연도)
  var monthIdx = -1;
  for (var h = 0; h < headers.length; h++) {
    if (headers[h].trim() === targetLabel) monthIdx = h;
  }
  if (monthIdx < 0) { console.warn('월 컬럼 못 찾음:', targetLabel, headers); return {}; }

  var out = {};
  var lastBrand = '', lastSub = '';

  for (var i = 1; i < lines.length; i++) {
    var cols = splitCSVLine(lines[i]);
    var rawBrand = (cols[0] || '').trim();
    var rawSub   = (cols[1] || '').trim();
    var rawCh    = (cols[2] || '').trim();

    if (rawBrand) lastBrand = rawBrand;
    if (rawSub)   lastSub   = rawSub;
    else if (rawBrand) lastSub = ''; // 브랜드 바뀌면 세부 초기화

    var budget = parseBudgetNum(cols[monthIdx] || '');
    if (!budget || !lastBrand || !rawCh) continue;

    // BUDGET_BRAND_MAP에서 매칭
    for (var m = 0; m < BUDGET_BRAND_MAP.length; m++) {
      var rule = BUDGET_BRAND_MAP[m];
      if (rule.brand === lastBrand && rule.sub === lastSub && rule.ch === rawCh) {
        out[rule.key] = (out[rule.key] || 0) + budget;
        break;
      }
    }
  }
  return out;
}

function loadBudgetForMonth(ym, callback) {
  // 전체 시트를 한 번만 로드하고 캐시
  if (budgetCache.raw) {
    var parsed = parseBudgetSheet(budgetCache.raw, ym.slice(5,7));
    callback(parsed);
    return;
  }
  fetch(BUDGET_URL)
    .then(function(r){ return r.text(); })
    .then(function(text){
      budgetCache.raw = text;
      var parsed = parseBudgetSheet(text, ym.slice(5,7));
      callback(parsed);
    })
    .catch(function(){ callback({}); });
}

function renderBudgetSection() {
  if (!budgetSectionOpen) return; // 닫혀있으면 스킵
  var ym = budgetPeriod.year + '-' + budgetPeriod.month;
  var barsEl = document.getElementById('budgetBars');
  barsEl.innerHTML = '<div style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--muted)">예산 불러오는 중...</div>';

  // 스케쳐스 시트 데이터가 없으면 먼저 로드
  function doRender() {
    loadBudgetForMonth(ym, function(budgets) {
      _renderBudgetBars(ym, budgets);
    });
  }

  if (!sheetsCache.skechers || !sheetsCache.minoxell || !sheetsCache.hyper) {
    var pending = 0;
    function checkDone() { pending--; if (pending === 0) doRender(); }
    if (!sheetsCache.skechers) { pending++; loadSkechers(function(){ checkDone(); }); }
    if (!sheetsCache.minoxell) { pending++; loadMinoxell(function(){ checkDone(); }); }
    if (!sheetsCache.hyper)    { pending++; loadHyper(function(){ checkDone(); }); }
  } else {
    doRender();
  }
}

function _renderBudgetBars(ym, budgets) {
  var barsEl = document.getElementById('budgetBars');
    var bk = brandKeys();
    var ck = chKeys();
    // 예산은 월 전체 기준 (일할 계산 없이 월 예산 그대로 표시)
    var mDays = monthDays(ym + '-01');

    // 브랜드 > 하위 > 매체 계층 구조 정의 (매체 순서: meta → nsa → ngfa → google)
    var BUDGET_STRUCTURE = [
      { brand:'스케쳐스', subs:[
        { label:'공식몰', key:'skechers_official', chs:['nsa','google'] },
        { label:'앱',     key:'skechers_app',      chs:['kakao','google'] }
      ]},
      { brand:'마이녹셀', subs:[
        { label:'마이녹셀', key:'minoxell',    chs:['meta','nbsa','nsa','ngfa'] },
        { label:'올리브영', key:'oliveyoung',  chs:['meta','ngfa'] }
      ]},
      { brand:'커리어벗', subs:[
        { label:'', key:'careerbud', chs:['meta','nbsa','google'] }
      ]},
      { brand:'하이퍼', subs:[
        { label:'키친에이드',       key:'kitchenaid',         chs:['nbsa','nsa','ngfa'] },
        { label:'키친에이드<br><span style="font-size:9px;opacity:.7">코드리스</span>', key:'kitchenaid_codeless', chs:['nsa'] },
        { label:'에코백스',         key:'ecovacs',            chs:['nsa','ngfa'] },
        { label:'아노바',           key:'anova',              chs:['nsa','ngfa'] }
      ]}
    ];

    var CH_LABEL_MAP = {meta:'Meta', nsa:'N.SA', ngfa:'N.GFA', google:'Google', kakao:'Kakao', nbsa:'N.BSA'};

    var rows = [];
    // 예산 달의 1일~말일
    var mDays2 = monthDays(ym + '-01');
    var budgetDateFrom = ym + '-01';
    var budgetDateTo   = ym + '-' + (mDays2 < 10 ? '0' + mDays2 : '' + mDays2);

    // 브랜드 × 매체별 수수료율 (예산 현황 전용)
    // 마이녹셀 메타 수수료: 2026년 3월부터 18.3%, 1~2월은 15%
    var minoxellMetaFee = 0.183;
    if (budgetPeriod.year === '2026' && parseInt(budgetPeriod.month, 10) <= 2) {
      minoxellMetaFee = 0.15;
    }

    var FEE_RATES = {
      'skechers_official__google': 0.15,
      'skechers_app__google':      0.15,
      'minoxell__meta':            minoxellMetaFee,
      'careerbud__google':         0.183,
      'careerbud__meta':           0.183
    };

    for (var si = 0; si < BUDGET_STRUCTURE.length; si++) {
      var brandGroup = BUDGET_STRUCTURE[si];
      for (var sj = 0; sj < brandGroup.subs.length; sj++) {
        var sub = brandGroup.subs[sj];
        for (var sk = 0; sk < sub.chs.length; sk++) {
          var chKey = sub.chs[sk];
          var storageKey  = sub.key + '__' + chKey;
          var monthBudget = budgets[storageKey] || 0;
          if (!monthBudget) continue;

          var spent = 0;
          var parsed = sheetsCache.skechers;

          if (parsed && sub.key === 'skechers_official') {
            var byDateMap = chKey === 'nsa' ? parsed.nsa : chKey === 'nbsa' ? (parsed.nbsa || {}) : parsed.googleOfficial;
            spent = sumByDateRange(byDateMap || {}, budgetDateFrom, budgetDateTo).cost || 0;
          } else if (parsed && sub.key === 'skechers_app') {
            var byDateMap2 = chKey === 'google' ? parsed.googleApp : {};
            spent = sumByDateRange(byDateMap2 || {}, budgetDateFrom, budgetDateTo).cost || 0;
          } else if (sheetsCache.minoxell && (sub.key === 'minoxell' || sub.key === 'oliveyoung')) {
            var pm2 = sheetsCache.minoxell;
            var byDateMap3 = null;
            if (sub.key === 'minoxell'   && chKey === 'nsa')  byDateMap3 = pm2.nsa;
            if (sub.key === 'minoxell'   && chKey === 'nbsa') byDateMap3 = pm2.nbsa;
            if (sub.key === 'minoxell'   && chKey === 'meta') byDateMap3 = pm2.meta;
            if (sub.key === 'minoxell'   && chKey === 'ngfa') byDateMap3 = pm2.ngfa;
            if (sub.key === 'oliveyoung' && chKey === 'ngfa') byDateMap3 = pm2.oliveyoung_ngfa;
            spent = sumByDateRange(byDateMap3 || {}, budgetDateFrom, budgetDateTo).cost || 0;
          } else if (sheetsCache.hyper) {
            var hyperKey = sub.key + '__' + chKey;
            var byDateH2 = sheetsCache.hyper[hyperKey] || {};
            spent = sumByDateRange(byDateH2, budgetDateFrom, budgetDateTo).cost || 0;
          } else {
            var chData = sumData([sub.key], [chKey], RAW);
            spent = aggCalc(chData).cost || 0;
          }

          var feeRate = FEE_RATES[storageKey] || 0;
          if (feeRate > 0) spent = Math.round(spent * (1 + feeRate));

          rows.push({
            brand:       brandGroup.brand,
            sub:         sub.label,
            ch:          CH_LABEL_MAP[chKey] || chKey,
            storageKey:  storageKey,
            monthBudget: monthBudget,
            spent:       spent
          });
        }
      }
    }

    if (rows.length === 0) {
      barsEl.innerHTML = '<div style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--muted);padding:4px 0">' + ym + ' 예산 데이터가 없어요</div>';
      return;
    }

    // 전일까지 일수 계산
    var today = new Date();
    var budgetYear  = parseInt(budgetPeriod.year, 10);
    var budgetMonth = parseInt(budgetPeriod.month, 10);
    var totalDays   = new Date(budgetYear, budgetMonth, 0).getDate();
    // 전일 = 오늘-1, 단 해당 월 기준
    var yesterday = new Date(today);
    yesterday.setDate(today.getDate() - 1);
    var elapsedDays;
    if (yesterday.getFullYear() === budgetYear && yesterday.getMonth()+1 === budgetMonth) {
      elapsedDays = yesterday.getDate();
    } else if (yesterday > new Date(budgetYear, budgetMonth, 0)) {
      elapsedDays = totalDays; // 해당 월이 지난 경우 전체
    } else {
      elapsedDays = 0;
    }
    var remainDays = totalDays - elapsedDays;

    var heads = ['브랜드','하위','매체','예산','소진액','소진 계획(전일)','소진율','잔액','소진 목표액(일)','소진 목표액<br>(일, 수수료 제외)'];
    var html = '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-family:\'DM Mono\',monospace;font-size:11px">';

    // 헤더
    html += '<tr>';
    for (var h = 0; h < heads.length; h++) {
      html += '<th style="padding:10px 16px;text-align:' + (h < 3 ? 'left' : 'right') + ';color:var(--muted);font-weight:400;border-bottom:1px solid var(--border2);white-space:nowrap;line-height:1.4">' + heads[h] + '</th>';
    }
    html += '</tr>';

    // 행 렌더링 - 브랜드별 소계 포함
    var lastBrandLabel = '';
    var lastSubLabel   = '';
    var brandTotals = {}; // { brand: { budget, spent, plan } }

    // 브랜드별 합산 미리 계산 + 마이녹셀은 하위별 합산도
    var brandTotals = {};
    var subTotals   = {}; // 'brand__sub' → {budget, spent, plan}

    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      var plan0 = totalDays > 0 ? Math.round(r.monthBudget / totalDays * elapsedDays) : 0;
      if (!brandTotals[r.brand]) brandTotals[r.brand] = {budget:0, spent:0, plan:0};
      brandTotals[r.brand].budget += r.monthBudget;
      brandTotals[r.brand].spent  += r.spent;
      brandTotals[r.brand].plan   += plan0;
      var subKey = r.brand + '__' + r.sub;
      if (!subTotals[subKey]) subTotals[subKey] = {label:r.sub, budget:0, spent:0, plan:0};
      subTotals[subKey].budget += r.monthBudget;
      subTotals[subKey].spent  += r.spent;
      subTotals[subKey].plan   += plan0;
    }

    // 하위 소계가 필요한 브랜드 (하위가 2개 이상)
    var BRANDS_WITH_SUBTOTALS = ['마이녹셀'];

    function renderSubtotalRow(brand, label, totals, isSubRow) {
      var t = totals;
      if (!t) return '';
      var pct  = t.budget > 0 ? t.spent / t.budget * 100 : 0;
      var rem  = t.budget - t.spent;
      var fc   = pct >= 100 ? '#ef4444' : pct >= 80 ? '#f97316' : '#22c55e';
      var fw   = Math.min(pct, 100).toFixed(1);
      var sc   = 'var(--text)';
      if (t.plan > 0) {
        var dp = (t.spent - t.plan) / t.plan * 100;
        if (dp >= 5) sc = 'var(--down)'; else if (dp <= -5) sc = 'var(--google)';
      }
      var dg  = remainDays > 0 ? Math.round(rem / remainDays) : 0;
      var bg  = isSubRow ? 'rgba(99,126,219,0.07)' : 'rgba(59,95,199,0.13)';
      var borderTop = isSubRow ? '1px solid rgba(99,126,219,0.2)' : '2px solid rgba(59,95,199,0.25)';
      var row = '<tr style="border-top:' + borderTop + ';background:' + bg + '">';
      if (isSubRow) {
        row += '<td style="padding:8px 16px"></td>';
        row += '<td style="padding:8px 16px;color:var(--text);font-weight:500;white-space:nowrap">' + label + '</td>';
        row += '<td style="padding:8px 16px;color:var(--muted);font-size:10px">소계</td>';
      } else {
        row += '<td style="padding:9px 16px;color:var(--text);font-weight:600;white-space:nowrap">' + brand + '</td>';
        row += '<td style="padding:9px 16px;color:var(--muted);font-size:10px">소계</td>';
        row += '<td style="padding:9px 16px"></td>';
      }
      row += '<td style="padding:9px 16px;text-align:right;font-weight:500">₩' + t.budget.toLocaleString('ko-KR') + '</td>';
      row += '<td style="padding:9px 16px;text-align:right;color:' + sc + ';font-weight:500">₩' + Math.round(t.spent).toLocaleString('ko-KR') + '</td>';
      row += '<td style="padding:9px 16px;text-align:right;color:var(--text);opacity:.75">₩' + t.plan.toLocaleString('ko-KR') + '</td>';
      row += '<td style="padding:5px 16px;text-align:right;min-width:90px"><div style="position:relative;height:22px;border-radius:4px;overflow:hidden;background:var(--bg3);min-width:80px"><div style="position:absolute;left:0;top:0;height:100%;width:' + fw + '%;background:' + fc + ';opacity:.3;border-radius:4px"></div><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-weight:600;color:' + fc + '">' + pct.toFixed(1) + '%</div></div></td>';
      row += '<td style="padding:9px 16px;text-align:right;color:' + (rem < 0 ? 'var(--down)' : 'var(--text)') + ';font-weight:500">₩' + Math.round(rem).toLocaleString('ko-KR') + '</td>';
      row += '<td style="padding:9px 16px;text-align:right;color:' + (dg < 0 ? 'var(--down)' : 'var(--text)') + ';font-weight:500">' + (remainDays > 0 ? '₩' + dg.toLocaleString('ko-KR') : '-') + '</td>';
      row += '<td style="padding:9px 16px"></td>';
      row += '</tr>';
      return row;
    }

    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      var budget    = r.monthBudget;
      var spent2    = r.spent;
      var plan      = totalDays > 0 ? Math.round(budget / totalDays * elapsedDays) : 0;
      var pctVal    = budget > 0 ? spent2 / budget * 100 : 0;
      var remain    = budget - spent2;
      var dailyGoal = remainDays > 0 ? Math.round(remain / remainDays) : 0;

      var fillColor = pctVal >= 100 ? '#ef4444' : pctVal >= 80 ? '#f97316' : '#22c55e';
      var fillWidth = Math.min(pctVal, 100).toFixed(1);

      var spentColor = 'var(--text)';
      if (plan > 0) {
        var diffPct = (spent2 - plan) / plan * 100;
        if (diffPct >= 5)       spentColor = 'var(--down)';
        else if (diffPct <= -5) spentColor = 'var(--google)';
      }

      // 브랜드 또는 하위 바뀌기 전에 소계 삽입
      if (lastBrandLabel) {
        var brandChanged = (r.brand !== lastBrandLabel);
        var subChanged   = !brandChanged && (r.sub !== lastSubLabel);
        var needsSubTotal = BRANDS_WITH_SUBTOTALS.indexOf(lastBrandLabel) !== -1;

        if (brandChanged) {
          // 하위 소계가 필요한 브랜드면 마지막 하위 소계 먼저
          if (needsSubTotal && lastSubLabel) {
            html += renderSubtotalRow(lastBrandLabel, lastSubLabel, subTotals[lastBrandLabel + '__' + lastSubLabel], true);
          }
          // 브랜드 소계
          html += renderSubtotalRow(lastBrandLabel, '', brandTotals[lastBrandLabel], false);
        } else if (subChanged && needsSubTotal) {
          // 같은 브랜드 내 하위 바뀔 때 하위 소계
          html += renderSubtotalRow(lastBrandLabel, lastSubLabel, subTotals[lastBrandLabel + '__' + lastSubLabel], true);
        }
      }

      var showBrand = (r.brand !== lastBrandLabel);
      var showSub   = (r.brand + '__' + r.sub !== lastBrandLabel + '__' + lastSubLabel);
      lastBrandLabel = r.brand;
      lastSubLabel   = r.sub;

      html += '<tr style="border-bottom:1px solid var(--border)">';
      html += '<td style="padding:11px 16px;color:var(--text);white-space:nowrap;font-weight:' + (showBrand ? '500' : '400') + '">' + (showBrand ? r.brand : '') + '</td>';
      html += '<td style="padding:11px 16px;color:var(--text);opacity:.75;line-height:1.4">' + (showSub ? r.sub : '') + '</td>';
      html += '<td style="padding:11px 16px;color:var(--text);opacity:.7;white-space:nowrap">' + r.ch + '</td>';
      html += '<td style="padding:11px 16px;text-align:right;color:var(--text)">₩' + budget.toLocaleString('ko-KR') + '</td>';
      html += '<td style="padding:11px 16px;text-align:right;color:' + spentColor + ';font-weight:500">₩' + Math.round(spent2).toLocaleString('ko-KR') + '</td>';
      html += '<td style="padding:11px 16px;text-align:right;color:var(--text);opacity:.75">₩' + plan.toLocaleString('ko-KR') + '</td>';
      html += '<td style="padding:7px 16px;text-align:right;min-width:90px">';
      html += '<div style="position:relative;height:22px;border-radius:4px;overflow:hidden;background:var(--bg3);min-width:80px">';
      html += '<div style="position:absolute;left:0;top:0;height:100%;width:' + fillWidth + '%;background:' + fillColor + ';opacity:.25;border-radius:4px"></div>';
      html += '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-weight:500;color:' + fillColor + '">' + pctVal.toFixed(1) + '%</div>';
      html += '</div></td>';
      html += '<td style="padding:11px 16px;text-align:right;color:' + (remain < 0 ? 'var(--down)' : 'var(--text)') + '">₩' + Math.round(remain).toLocaleString('ko-KR') + '</td>';
      html += '<td style="padding:11px 16px;text-align:right;color:' + (dailyGoal < 0 ? 'var(--down)' : 'var(--text)') + '">' + (remainDays > 0 ? '₩' + dailyGoal.toLocaleString('ko-KR') : '-') + '</td>';

      // 수수료 제외 소진 목표액(일)
      var netDailyGoal = dailyGoal;
      var feeR = FEE_RATES[r.storageKey] || 0;
      if (feeR > 0) netDailyGoal = Math.round(dailyGoal / (1 + feeR));
      html += '<td style="padding:11px 16px;text-align:right;color:' + (netDailyGoal < 0 ? 'var(--down)' : 'var(--muted)') + '">' + (remainDays > 0 ? '₩' + netDailyGoal.toLocaleString('ko-KR') : '-') + '</td>';

      html += '</tr>';
    }
    // 마지막 브랜드 소계
    if (lastBrandLabel) {
      if (BRANDS_WITH_SUBTOTALS.indexOf(lastBrandLabel) !== -1 && lastSubLabel) {
        html += renderSubtotalRow(lastBrandLabel, lastSubLabel, subTotals[lastBrandLabel + '__' + lastSubLabel], true);
      }
      html += renderSubtotalRow(lastBrandLabel, '', brandTotals[lastBrandLabel], false);
    }
    html += '</table></div>';
    barsEl.innerHTML = html;
}

// 예산 소진 현황 토글
var budgetSectionOpen = false;
function toggleBudgetSection() {
  budgetSectionOpen = !budgetSectionOpen;
  var bars   = document.getElementById('budgetBars');
  var arrow  = document.getElementById('budgetArrow');
  bars.style.display = budgetSectionOpen ? 'flex' : 'none';
  arrow.style.transform = budgetSectionOpen ? 'rotate(0deg)' : 'rotate(-90deg)';
  if (budgetSectionOpen) renderBudgetSection();
}
